<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Reservation System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── 파스텔 테마 색상 ── */
  --bg: #eef2f7;
  --surface: #ffffff;
  --surface2: #e8f0fb;
  --border: #c8d5e8;
  --accent: #3b6fd4;
  --accent2: #7c3aed;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #d97706;
  --text: #1e2a3a;
  --text2: #4a5568;
  --text3: #8a98a8;
  --sidebar-w: 220px;
  --radius: 10px;

  /* 페이지별 파스텔 배경 */
  --cal-bg: #f0f5ff;
  --team-bg: #f5f0ff;
  --search-bg: #f0fff8;
  --admin-bg: #fff8f0;
  --modal-bg: #f2f8ff;

  /* Event colors - 최대한 구별되도록 */
  --ev-academic: #1d4ed8;
  --ev-immersion2: #9d174d;
  --ev-immersion3: #047857;
  --ev-cookery: #b45309;
  --ev-ooca1: #7c3aed;
  --ev-ooca2: #0891b2;
  --ev-ooca3: #dc2626;
  --ev-dlpt: #1e3a2f;
  --ev-custom1: #c2410c;
  --ev-custom2: #0f4c75;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 16.8px;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  background: #1a2235;
  border-right: 1px solid #2d3a50;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  box-shadow: 2px 0 12px rgba(0,0,0,.25);
}

.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #3b6fd4 0%, #7c3aed 100%);
}
.sidebar-logo h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #fff;
}
.sidebar-logo p {
  font-size: 10px;
  color: rgba(255,255,255,.75);
  margin-top: 2px;
}

.nav-section {
  padding: 8px 0;
  border-bottom: 1px solid #2d3a50;
  background: #1a2235;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #a8b8d0;
  transition: all .15s;
  border-left: 3px solid transparent;
  user-select: none;
}
.nav-item:hover { background: #253352; color: #e8f0ff; }
.nav-item.active { background: rgba(100,160,255,.15); color: #7eb3ff; border-left-color: #7eb3ff; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

.nav-tree {
  overflow-y: auto;
  flex: 1;
  padding: 4px 0;
}
.nav-tree::-webkit-scrollbar { width: 3px; }
.nav-tree::-webkit-scrollbar-thumb { background: #3a4a60; border-radius: 3px; }

.tree-dept { user-select: none; }
.tree-dept-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #8a9db8;
  transition: all .15s;
  letter-spacing: .04em;
}
.tree-dept-header:hover { color: #d0e0ff; background: #253352; }
.tree-dept-header .arrow { margin-left: auto; transition: transform .2s; font-size: 10px; }
.tree-dept.open .arrow { transform: rotate(90deg); }
.tree-dept-children { display: none; padding: 2px 0; }
.tree-dept.open .tree-dept-children { display: block; }

.tree-team {
  display: flex;
  align-items: center;
  padding: 6px 16px 6px 32px;
  cursor: pointer;
  font-size: 12px;
  color: #6a7f9a;
  transition: all .15s;
  gap: 6px;
}
.tree-team:hover { color: #c8deff; background: rgba(255,255,255,.05); }
.tree-team.active { color: #7eb3ff; }
.tree-team::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ── Main Content ── */
#main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.page.active { display: flex; }

/* ── Calendar Page ── */
#page-calendar { padding: 0; background: var(--cal-bg); }

.cal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid #b8c8f0;
  background: linear-gradient(to right, #dde8ff, #e8d8ff);
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(59,111,212,.1);
}
.cal-header h2 { font-size: 15px; font-weight: 600; flex: 1; color: var(--text); }
.cal-nav-btn {
  background: rgba(255,255,255,.7);
  border: 1px solid #b8c8f0;
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all .15s;
}
.cal-nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 6px 20px;
  background: rgba(255,255,255,.7);
  border-bottom: 1px solid #d0dcf8;
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text2);
}
.legend-dot { width: 11px; height: 11px; border-radius: 2px; }

/* 캘린더 바디: 화면 꽉 차게 */
.cal-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  background: var(--cal-bg);
}
.cal-body::-webkit-scrollbar { width: 4px; }
.cal-body::-webkit-scrollbar-thumb { background: var(--border); }

.cal-view-btn {
  background: rgba(255,255,255,.6);
  border: 1px solid #b8c8f0;
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  transition: all .15s;
}
.cal-view-btn.active, .cal-view-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.cal-grid-header {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.cal-grid-header div {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 4px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  flex: 1;
  /* 캘린더 셀이 남은 공간 채우도록 */
  grid-auto-rows: 1fr;
}

.cal-cell {
  background: rgba(255,255,255,.8);
  border: 1px solid #d0ddf0;
  border-radius: 6px;
  min-height: 110px;
  padding: 6px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.cal-cell:hover { border-color: var(--accent); background: rgba(255,255,255,.95); box-shadow: 0 2px 8px rgba(59,111,212,.15); }
.cal-cell.today { border-color: var(--accent); background: rgba(220,235,255,.6); }
.cal-cell.holiday { background: rgba(255,235,235,.7); border-color: rgba(220,38,38,.2); }
.cal-cell.other-month { opacity: .4; }
.cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.empty:hover { background: transparent; border-color: transparent; box-shadow: none; }

.cal-date { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.cal-cell.today .cal-date { color: var(--accent); }
.cal-cell.holiday .cal-date { color: var(--red); }

.cal-holiday-name { font-size: 12px; color: var(--red); font-weight: 500; margin-bottom: 3px; opacity: .8; }

.cal-events { display: flex; flex-direction: column; gap: 2px; }

.cal-event-chip {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 6px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: .02em;
}

/* ── Team Detail Page ── */
#page-team { overflow: hidden; background: var(--team-bg); }

.team-header {
  padding: 14px 20px;
  border-bottom: 1px solid #d0b8f8;
  background: linear-gradient(to right, #ede0ff, #ffd8ec);
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(124,58,237,.1);
}
.team-header h2 { font-size: 16px; font-weight: 700; color: var(--text); }
.team-header p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.team-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  background: var(--team-bg);
}
.team-body::-webkit-scrollbar { width: 4px; }
.team-body::-webkit-scrollbar-thumb { background: var(--border); }

.section-card {
  background: rgba(255,255,255,.85);
  border: 1px solid #ddd0f5;
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 6px rgba(124,58,237,.07);
}
.section-card h3 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

/* ── 교실 입력 (3개 빈칸) ── */
.classrooms-inputs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 10px;
}
.classroom-input-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.classroom-input-group label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  white-space: nowrap;
}
.classroom-inp-field {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 5px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  width: 90px;
  transition: border-color .15s;
}
.classroom-inp-field:focus { outline: none; border-color: var(--accent); }
.classroom-inp-field::placeholder { color: #c0c8d4; font-style: italic; }

.classrooms-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.classroom-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 500;
}
.classroom-tag .rm-btn {
  cursor: pointer;
  color: var(--text3);
  font-size: 14px;
  line-height: 1;
  transition: color .15s;
}
.classroom-tag .rm-btn:hover { color: var(--red); }
.add-classroom-btn {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text3);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all .15s;
}
.add-classroom-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 행사 일정 2열 레이아웃 */
.events-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 700px) {
  .events-two-col { grid-template-columns: 1fr; }
}

/* 추가행사 헤더 인라인 버튼 */
.add-event-btn-inline {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--accent);
  padding: 2px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  margin-left: 8px;
  vertical-align: middle;
  transition: all .15s;
}
.add-event-btn-inline:hover { border-color: var(--accent); background: rgba(59,111,212,.06); }

/* Events table */
.events-table { width: 100%; border-collapse: collapse; }
.events-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
.events-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(200,210,220,.5);
  vertical-align: middle;
}
.events-table tr:last-child td { border-bottom: none; }
.events-table .event-name-cell { font-size: 12px; font-weight: 600; }
.event-color-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  margin-right: 6px;
}

/* 행사명 2줄 표시 */
.event-name-lines {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.event-name-main {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.event-name-sub {
  font-size: 10px;
  color: var(--text3);
  font-weight: 400;
  line-height: 1.2;
}

.inp {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 5px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  width: 100px;
  transition: border-color .15s;
}
.inp:focus { outline: none; border-color: var(--accent); }
.inp::placeholder { color: var(--text3); }
.inp-sm { width: 80px; }

.ampm-group { display: flex; gap: 4px; }
.ampm-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  transition: all .15s;
}
.ampm-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* 행사 추가 + 저장 버튼 한 줄 배치 */
.add-event-save-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
}
.add-event-btn {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--accent);
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  flex: 1;
  transition: all .15s;
}
.add-event-btn:hover { border-color: var(--accent); background: rgba(37,99,235,.05); }

.save-team-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 7px 20px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
}
.save-team-btn:hover { background: #1d4ed8; }

/* ── Booking Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 820px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
.modal-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(to right, #e0f0ff, #d8f5f0);
}
.modal-head h3 { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
.modal-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

.modal-body {
  overflow-y: auto;
  flex: 1;
  padding: 16px 18px;
  background: var(--bg);
}
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); }

.event-banner { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.event-banner-chip {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: .04em;
}

.classroom-block { margin-bottom: 16px; }
.classroom-block h4 {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

/* 교시 그리드: 0~8교시를 한 줄에 */
.periods-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 4px;
}

/* 교시 슬롯을 작게 */
.period-slot {
  background: #16a34a;
  border: 1.5px solid #15803d;
  border-radius: 6px;
  padding: 5px 4px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  text-align: center;
}
.period-slot.booked {
  background: #dc2626;
  border-color: #b91c1c;
}
.period-slot:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.18); filter: brightness(1.1); }

.period-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.95);
  line-height: 1.2;
}
.period-team {
  font-size: 10px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  margin: 2px 0 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
}
.period-slot.booked .period-team { color: #fff; }
.period-slot:not(.booked) .period-team { color: rgba(255,255,255,.8); }
.period-status { display: none; }

.period-slot.locked {
  background: #b0b8c8;
  border-color: #98a0b0;
  cursor: not-allowed;
  opacity: 0.55;
}
.period-slot.locked .period-label { color: rgba(255,255,255,.8); }
.period-slot.locked .period-team { color: rgba(255,255,255,.6); }

/* Booking form */
.booking-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-top: 8px;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.booking-form.open { display: block; }
.booking-form label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.booking-form-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 6px;
}
.booking-inp {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  font-weight: 600;
  text-transform: uppercase;
}
.booking-inp:focus { outline: none; border-color: var(--accent); }
.booking-inp::placeholder { color: #c0c8d4; font-style: italic; font-weight: 400; text-transform: none; }

.book-btn {
  background: var(--green);
  border: none;
  color: #fff;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 700;
}
.book-btn:hover { background: #15803d; }
.cancel-btn {
  background: var(--red);
  border: none;
  color: #fff;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 700;
}
.cancel-btn:hover { background: #b91c1c; }

/* 예약 기록 로그 */
.booking-log { margin-top: 20px; }
.booking-log h4 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.log-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 4px;

// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const ADMIN_PASSWORD  = 'admin1234';

// ══════════════════════════════════════════════
//  US Federal Holidays
// ══════════════════════════════════════════════
function getUSHolidays(year) {
  const nthWeekday = (m, n, wd) => {
    let d = new Date(year, m, 1), cnt = 0;
    while (true) { if (d.getDay() === wd) { cnt++; if (cnt === n) return d; } d.setDate(d.getDate()+1); }
  };
  const lastMon = (m) => {
    let d = new Date(year, m+1, 0);
    while (d.getDay() !== 1) d.setDate(d.getDate()-1);
    return d;
  };
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return {
    [`${year}-01-01`]: "New Year's Day",
    [fmt(nthWeekday(0,3,1))]: 'MLK Jr. Day',
    [fmt(nthWeekday(1,3,1))]: "Presidents' Day",
    [fmt(lastMon(4))]: 'Memorial Day',
    [`${year}-06-19`]: 'Juneteenth',
    [`${year}-07-04`]: 'Independence Day',
    [fmt(nthWeekday(8,1,1))]: 'Labor Day',
    [fmt(nthWeekday(9,2,1))]: 'Columbus Day',
    [`${year}-11-11`]: 'Veterans Day',
    [fmt(nthWeekday(10,4,4))]: 'Thanksgiving Day',
    [`${year}-12-25`]: 'Christmas Day',
  };
}

// ══════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════
let state = {
  currentYear : new Date().getFullYear(),
  currentMonth: new Date().getMonth(),
  selectedTeam: null,
  searchRange  : 'day',
  adminUnlocked: false,
  teams: {},
  bookings: {},
  bookingLogs: {},   // key -> [{action, team, ts, date}] 최대 10개
  depts: ['KA','KB','KC','KD','KE','KF'],
  deptTeams: {},     // dept -> [teamName, ...] 커스텀 팀 목록
};

// ══════════════════════════════════════════════
//  DEPT / TEAM TREE
// ══════════════════════════════════════════════
const FIXED_EVENTS = [
  { key:'academic',    label:'Academic Break',    subLabel:'5일간',     days:5,  hasAmPm:false, weekday:'friday' },
  { key:'immersion2',  label:'2학기 Immersion',   subLabel:'2일간',     days:2,  hasAmPm:false },
  { key:'immersion3',  label:'3학기 Immersion',   subLabel:'2일간',     days:2,  hasAmPm:false },
  { key:'cookery',     label:'Cookery',           subLabel:'1일',       days:1,  hasAmPm:false },
  { key:'ooca1',       label:'1학기 OOCA',        subLabel:'1일',       days:1,  hasAmPm:true },
  { key:'ooca2',       label:'2학기 OOCA',        subLabel:'1일',       days:1,  hasAmPm:true },
  { key:'ooca3',       label:'3학기 OOCA',        subLabel:'1일',       days:1,  hasAmPm:true },
  { key:'dlpt',        label:'DLPT',              subLabel:'Thu→next Wed', days:0, hasAmPm:false, special:'dlpt' },
];

const EVENT_COLORS = {
  academic:   '#1d4ed8', // 선명한 파랑
  immersion2: '#9d174d', // 진분홍/자주
  immersion3: '#047857', // 에메랄드 초록
  cookery:    '#b45309', // 황토/주황갈색
  ooca1:      '#7c3aed', // 보라
  ooca2:      '#0891b2', // 하늘파랑(cyan)
  ooca3:      '#dc2626', // 빨강
  dlpt:       '#1e3a2f', // 다크그린
  // custom — 기본 8개와 겹치지 않는 색
  custom0:    '#c2410c', // 주황빨강
  custom1:    '#0f4c75', // 네이비
  custom2:    '#5b21b6', // 인디고보라
  custom3:    '#065f46', // 진초록
  custom4:    '#92400e', // 다크갈색
  custom5:    '#831843', // 다크핑크
  custom6:    '#164e63', // 다크청록
  custom7:    '#3f3f46', // 다크그레이
  custom8:    '#4d7c0f', // 올리브그린
  custom9:    '#6d1f7c', // 다크보라
};

function textColor(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 < 128 ? '#ffffff' : '#111111';
}

function buildTree() {
  const tree = document.getElementById('dept-tree');
  tree.innerHTML = '';
  state.depts.forEach(dept => {
    const div = document.createElement('div');
    div.className = 'tree-dept';
    div.id = 'dept-'+dept;
    const teams = getTeamsForDept(dept);
    div.innerHTML = `
      <div class="tree-dept-header" onclick="toggleDept('${dept}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        ${dept}
        <span class="arrow">▶</span>
      </div>
      <div class="tree-dept-children">
        ${teams.map(t=>`<div class="tree-team" id="nav-${t}" onclick="selectTeam('${t}')">${t}</div>`).join('')}
      </div>`;
    tree.appendChild(div);
  });
}

function getTeamsForDept(dept) {
  // state에 커스텀 팀 목록이 있으면 사용, 없으면 기본 5개
  if (state.deptTeams && state.deptTeams[dept]) return state.deptTeams[dept];
  return Array.from({length:5},(_,i)=>`${dept}${i+1}`);
}

function toggleDept(dept) {
  const el = document.getElementById('dept-'+dept);
  el.classList.toggle('open');
}

function selectTeam(team) {
  state.selectedTeam = team;
  document.querySelectorAll('.tree-team').forEach(e=>e.classList.remove('active'));
  const nav = document.getElementById('nav-'+team);
  if (nav) nav.classList.add('active');
  showPage('team', null);
  renderTeamDetail(team);
}

// ══════════════════════════════════════════════
//  PAGE NAVIGATION
// ══════════════════════════════════════════════
function showPage(id, navEl) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
}

// ══════════════════════════════════════════════
//  TEAM INIT
// ══════════════════════════════════════════════
function ensureTeam(team) {
  if (!state.teams[team]) {
    state.teams[team] = {
      classrooms: [],
      events: {

// ══════════════════════════════════════════════
//  DATE HELPERS
// ══════════════════════════════════════════════
function dateStr(d) {
  if (!d) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}

function nextWeekday(d, wd) {
  const r = new Date(d);
  while (r.getDay() !== wd) r.setDate(r.getDate()+1);
  return r;
}

function parseMMDDYY(str) {
  if (!str) return null;
  // 숫자만 6자리 입력 (052026 → 05/20/26)
  const compact = str.replace(/\D/g,'');
  if (compact.length === 6) {
    str = compact.slice(0,2) + '/' + compact.slice(2,4) + '/' + compact.slice(4,6);
  }
  const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (!m) return null;
  const yr = m[3].length===2 ? 2000+parseInt(m[3]) : parseInt(m[3]);
  return new Date(yr, parseInt(m[1])-1, parseInt(m[2]));
}

// 날짜 입력 자동 포맷 (입력창에서 blur 시)
function autoFormatDate(input) {
  const compact = input.value.replace(/\D/g,'');
  if (compact.length === 6) {
    input.value = compact.slice(0,2) + '/' + compact.slice(2,4) + '/' + compact.slice(4,6);
  }
}

function autoFormatDateAndUpdate(team, key, input) {
  autoFormatDate(input);
  updateEvDate(team, key, input.value);
}

function autoFormatCustomEv(team, idx, field, input) {
  autoFormatDate(input);
  updateCustomEv(team, idx, field, input.value);
}

// ── Calendar View Mode ──
let calViewMode = 'month'; // 'month' | 'week' | 'day'

function setCalView(mode, btn) {
  calViewMode = mode;
  document.querySelectorAll('.cal-view-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCalendar();
}

function getEventDates() {
  const result = {};
  const add = (d, info) => {
    const k = dateStr(d);
    if (!k) return;
    if (!result[k]) result[k] = [];
    result[k].push(info);
  };

  Object.keys(state.teams).forEach(t => {
    const tData = state.teams[t];
    const evs = tData.events;

    const acDate = parseMMDDYY(evs.academic?.date);
    if (acDate) {
      const fri = nextWeekday(acDate, 5);
      for (let i=4; i>=0; i--) {
        const dd = addDays(fri, -i);
        if (dd.getDay()>=1 && dd.getDay()<=5)
          add(dd, {label:'Academic', color:EVENT_COLORS.academic, key:'academic', team:t});
      }
    }

    const im2Date = parseMMDDYY(evs.immersion2?.date);
    if (im2Date) {
      for (let i=0;i<2;i++) add(addDays(im2Date,i), {label:'Immersion 2', color:EVENT_COLORS.immersion2, key:'immersion2', team:t});
    }

    const im3Date = parseMMDDYY(evs.immersion3?.date);
    if (im3Date) {
      for (let i=0;i<2;i++) add(addDays(im3Date,i), {label:'Immersion 3', color:EVENT_COLORS.immersion3, key:'immersion3', team:t});
    }

    const ckDate = parseMMDDYY(evs.cookery?.date);
    if (ckDate) add(ckDate, {label:'Cookery', color:EVENT_COLORS.cookery, key:'cookery', team:t});

    ['ooca1','ooca2','ooca3'].forEach(key => {
      const d = parseMMDDYY(evs[key]?.date);
      if (d) {
        const ampm = [evs[key]?.am?'AM':'', evs[key]?.pm?'PM':''].filter(Boolean).join('/');
        const labels = {'ooca1':'OOCA 1학기','ooca2':'OOCA 2학기','ooca3':'OOCA 3학기'};
        add(d, {label:`${labels[key]}${ampm?' ('+ampm+')':''}`, color:EVENT_COLORS[key], key, team:t});
      }
    });

    const dlptDate = parseMMDDYY(evs.dlpt?.date);
    if (dlptDate) {
      const thu = nextWeekday(dlptDate,4);
      for (let i=0;i<7;i++) {
        const dd = addDays(thu,i);
        const dow = dd.getDay();
        if (dow>=1&&dow<=5) add(dd, {label:'DLPT', color:EVENT_COLORS.dlpt, key:'dlpt', team:t});
      }
    }

    (evs.custom||[]).forEach((cev,idx) => {
      const d = parseMMDDYY(cev.date);
      if (d && cev.name) {
        const ampm = [cev.am?'AM':'',cev.pm?'PM':''].filter(Boolean).join('/');
        add(d, {label:`${cev.name}${ampm?' ('+ampm+')':''}`, color:EVENT_COLORS['custom'+idx]||'#555', key:'custom'+idx, team:t});
      }
    });
  });

  return result;
}

// ══════════════════════════════════════════════
//  CALENDAR RENDER
// ══════════════════════════════════════════════
let holidays = {};

function calMove(dir) {
  if (calViewMode === 'month') {
    state.currentMonth += dir;
    if (state.currentMonth > 11) { state.currentMonth=0; state.currentYear++; }
    if (state.currentMonth < 0)  { state.currentMonth=11; state.currentYear--; }
  } else if (calViewMode === 'week') {
    // 7일씩 이동
    const base = new Date(state.currentYear, state.currentMonth, state.currentDay || 1);
    const next = addDays(base, dir*7);
    state.currentYear = next.getFullYear();
    state.currentMonth = next.getMonth();
    state.currentDay = next.getDate();
  } else if (calViewMode === 'day') {
    const base = new Date(state.currentYear, state.currentMonth, state.currentDay || new Date().getDate());
    // skip weekends
    let next = addDays(base, dir);
    while (next.getDay()===0||next.getDay()===6) next = addDays(next, dir);
    state.currentYear = next.getFullYear();
    state.currentMonth = next.getMonth();
    state.currentDay = next.getDate();
  }
  renderCalendar();
}
function calGoToday() {
  const n = new Date();
  state.currentYear = n.getFullYear();
  state.currentMonth = n.getMonth();
  state.currentDay = n.getDate();
  renderCalendar();
}

function renderCalendar() {
  const y = state.currentYear, m = state.currentMonth;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  if (!holidays[y]) holidays[y] = getUSHolidays(y);
  const hy = holidays[y];
  const eventMap = getEventDates();
  const today = dateStr(new Date());

  // ── 범례: 기본 8개 + 추가행사만 ──
  const legendDiv = document.getElementById('cal-legend');
  legendDiv.innerHTML = '';
  const fixedLegend = [
    {key:'academic',   label:'Academic Break',  color:EVENT_COLORS.academic},
    {key:'immersion2', label:'2학기 Immersion',  color:EVENT_COLORS.immersion2},
    {key:'immersion3', label:'3학기 Immersion',  color:EVENT_COLORS.immersion3},
    {key:'cookery',    label:'Cookery',          color:EVENT_COLORS.cookery},
    {key:'ooca1',      label:'1학기 OOCA',       color:EVENT_COLORS.ooca1},
    {key:'ooca2',      label:'2학기 OOCA',       color:EVENT_COLORS.ooca2},
    {key:'ooca3',      label:'3학기 OOCA',       color:EVENT_COLORS.ooca3},
    {key:'dlpt',       label:'DLPT',             color:EVENT_COLORS.dlpt},
  ];
  fixedLegend.forEach(({label, color}) => {
    legendDiv.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label}</div>`;
  });
  // 추가 행사(custom)만 추가
  const usedCustomKeys = new Set();
  Object.values(eventMap).forEach(arr => arr.forEach(e => {
    if (e.key && e.key.startsWith('custom')) usedCustomKeys.add(e.key+'|'+e.label+'|'+(EVENT_COLORS[e.key]||'#555'));
  }));
  usedCustomKeys.forEach(kv => {
    const [,label,color] = kv.split('|');
    legendDiv.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label.replace(/ \(AM\)| \(PM\)| \(AM\/PM\)/,'')}</div>`;
  });

  const grid = document.getElementById('cal-grid');
  const gridHeader = document.querySelector('.cal-grid-header');
  grid.innerHTML = '';

  if (calViewMode === 'month') {
    document.getElementById('cal-title').textContent = `${months[m]} ${y}`;
    gridHeader.style.display = 'grid';
    gridHeader.innerHTML = '<div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div>';
    grid.style.gridTemplateColumns = 'repeat(5, 1fr)';

    const firstDay = new Date(y, m, 1).getDay();
    const offset = firstDay === 0 ? 4 : firstDay - 1;
    const totalDays = new Date(y, m+1, 0).getDate();

    for (let i=0; i<offset && i<5; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      grid.appendChild(cell);
    }
    for (let d=1; d<=totalDays; d++) {
      const date = new Date(y, m, d);
      const dow = date.getDay();
      if (dow === 0 || dow === 6) continue;
      const ds = dateStr(date);
      renderCalCell(grid, ds, date, hy, eventMap, today);
    }

  } else if (calViewMode === 'week') {
    // 현재 날짜 기준 주 (월~금)
    const baseDate = new Date(y, m, state.currentDay || new Date().getDate());
    const dow = baseDate.getDay();
    const mon = new Date(baseDate);
    mon.setDate(mon.getDate() - (dow===0?6:dow-1));
    const weekDays = Array.from({length:5}, (_,i) => addDays(mon, i));
    const fri = weekDays[4];
    document.getElementById('cal-title').textContent =
      `Week: ${months[mon.getMonth()]} ${mon.getDate()} – ${months[fri.getMonth()]} ${fri.getDate()}, ${fri.getFullYear()}`;
    gridHeader.style.display = 'grid';
    gridHeader.innerHTML = weekDays.map(d=>`<div>${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]} ${d.getMonth()+1}/${d.getDate()}</div>`).join('');
    grid.style.gridTemplateColumns = 'repeat(5, 1fr)';
    weekDays.forEach(date => {
      const ds = dateStr(date);
      renderCalCell(grid, ds, date, hy, eventMap, today);
    });

  } else if (calViewMode === 'day') {
    // Today 단일 날
    const todayDate = new Date();
    const ds = dateStr(todayDate);
    document.getElementById('cal-title').textContent = `Today: ${months[todayDate.getMonth()]} ${todayDate.getDate()}, ${todayDate.getFullYear()}`;
    gridHeader.style.display = 'none';
    grid.style.gridTemplateColumns = '1fr';
    renderCalCell(grid, ds, todayDate, hy, eventMap, today, true);
  }
}

function renderCalCell(grid, ds, date, hy, eventMap, today, large) {
  const isHoliday = !!hy[ds];
  const isToday = ds === today;
  const eventsHere = eventMap[ds] || [];
  const cell = document.createElement('div');
  cell.className = 'cal-cell' + (isHoliday?' holiday':'') + (isToday?' today':'');
  if (large) cell.style.minHeight = '200px';
  cell.onclick = () => openBookingModal(ds, eventsHere);
  let html = `<div class="cal-date">${date.getMonth()+1}/${date.getDate()}</div>`;
  if (isHoliday) html += `<div class="cal-holiday-name">${hy[ds]}</div>`;
  if (eventsHere.length > 0) {
    html += '<div class="cal-events">';
    eventsHere.slice(0,3).forEach(ev => {
      const tc = textColor(ev.color);
      html += `<div class="cal-event-chip" style="background:${ev.color};color:${tc}" title="${ev.team}: ${ev.label}">${ev.team}: ${ev.label}</div>`;
    });
    if (eventsHere.length > 3) html += `<div style="font-size:9px;color:var(--text3)">+${eventsHere.length-3} more</div>`;
    html += '</div>';
  }
  cell.innerHTML = html;
  grid.appendChild(cell);
}

  const body  = document.getElementById('modal-body');

  const d = new Date(dateString+'T00:00:00');
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];

  body.innerHTML = '';

      const tc = textColor(ev.color);
      banner.innerHTML += `<div class="event-banner-chip" style="background:${ev.color};color:${tc}">${ev.team}: ${ev.label}</div>`;
    });
    body.appendChild(banner);
  }

  }

  if (teamsOnDay.length === 0) {
    body.innerHTML += '<div class="no-data">이 날짜에 등록된 행사가 없습니다.<br>팀 메뉴에서 행사를 먼저 등록해 주세요.</div>';

      const teamDiv = document.createElement('div');

      classrooms.forEach(room => {
        const block = document.createElement('div');

        block.innerHTML = `<h4>🏫 ${room}</h4><div class="periods-grid" id="grid-${team}-${room.replace(/\s/g,'_')}"></div>`;
        body.appendChild(block);
        renderPeriodSlots(dateString, team, room);
      });
    });

  modal.classList.add('open');
}

function renderPeriodSlots(ds, team, room) {
  const gridId = `grid-${team}-${room.replace(/\s/g,'_')}`;
  const grid = document.getElementById(gridId);
  if (!grid) return;
  grid.innerHTML = '';

  // 이 날짜에 해당 팀의 AM/PM 제한 파악
  // 모든 행사(fixed+custom) 중 이 날짜에 해당하는 이벤트의 am/pm 플래그 수집
  let hasAmRestriction = false, hasPmRestriction = false;
  ensureTeam(team);
  const evs = state.teams[team].events;
  const allEvDefs = [
    ...['ooca1','ooca2','ooca3'].map(k => ({key:k, ...evs[k]})),
    ...(evs.custom||[]).map((c,i) => ({key:'custom'+i, ...c}))
  ];
  allEvDefs.forEach(ev => {
    if (!ev.date) return;
    const d = parseMMDDYY(ev.date);
    if (!d) return;
    const evDs = dateStr(d);
    if (evDs === ds) {
      if (ev.am) hasAmRestriction = true;
      if (ev.pm) hasPmRestriction = true;
    }
  });

  // AM만 선택 → 0~4 가능, 5~8 잠금
  // PM만 선택 → 0~4 잠금, 5~8 가능
  // 둘 다 또는 없음 → 모두 가능
  function isPeriodLocked(p) {
    if (hasAmRestriction && !hasPmRestriction) return p >= 5; // AM only → lock PM slots
    if (!hasAmRestriction && hasPmRestriction) return p <= 4; // PM only → lock AM slots
    return false;
  }

  for (let p=0; p<=8; p++) {
    const key = `${ds}|${room}|${p}`;
    const booking = state.bookings[key];
    const isBooked = booking && booking.action==='booked';
    const locked = isPeriodLocked(p);

    const slot = document.createElement('div');
    if (locked && !isBooked) {
      slot.className = 'period-slot locked';
    } else {
      slot.className = 'period-slot' + (isBooked?' booked':'');
    }
    slot.id = `slot-${ds}-${team}-${room.replace(/\s/g,'_')}-${p}`;
    slot.innerHTML = `
      <div class="period-label">${p}교시</div>
      <div class="period-team">${isBooked ? booking.team : (locked?'—':'—')}</div>
      <div class="period-status">${isBooked ? '예약됨' : (locked?'마감':'가능')}</div>`;
    if (!locked || isBooked) {
      slot.onclick = () => openBookingForm(ds, team, room, p, slot, isBooked, booking);
    }
    grid.appendChild(slot);
  }
}

let activeBookingForm = null;

function openBookingForm(ds, team, room, period, slotEl, isBooked, booking) {
  if (activeBookingForm) {
    activeBookingForm.remove();

  slotEl.dataset.formOpen = 'true';

  const form = document.createElement('div');
  form.className = 'booking-form open';
  activeBookingForm = form;

  if (!isBooked) {
    form.innerHTML = `
      <label>예약 팀 입력</label>
      <div class="booking-form-row">
        <input class="booking-inp" id="bf-team-${period}" placeholder="예) KA1" maxlength="5"

        <button class="book-btn" onclick="doBook('${ds}','${room}','${period}',document.getElementById('bf-team-${period}').value)">예약</button>
      </div>`;
  } else {
    const bookingTime = new Date(booking.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

      <label>현재 예약: <strong style="color:var(--accent)">${booking.team}</strong>

      </label>

        <input class="booking-inp" id="bf-team-${period}" placeholder="예) KA1" maxlength="5"
          value="${booking.team}" style="text-transform:uppercase">
        <button class="book-btn" onclick="doBook('${ds}','${room}','${period}',document.getElementById('bf-team-${period}').value)">변경</button>
        <button class="cancel-btn" onclick="doCancel('${ds}','${room}','${period}')">취소</button>
      </div>`;
  }

  // 이 교시의 예약 기록 표시 (최대 10개, 오래된 순)
  const roomKey = `${ds}|${room}|${period}`;
  const logs = state.bookingLogs[roomKey] || [];
  const bk = state.bookings[roomKey];

  if (logs.length === 0 && bk) {
    // 이전 버전 호환: logs 없으면 bookings에서 단건 표시
    const d = new Date(bk.ts);
    const dateStr2 = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const timeStr2 = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    const badgeText = bk.action==='booked'?'예약':bk.action==='changed'?'변경':'취소';
    const badgeClass = bk.action==='booked'?'booked':bk.action==='changed'?'changed':'cancelled';
    form.innerHTML += `
      <div class="booking-log-inline">
        <div class="booking-log-inline-title">📋 예약 기록</div>
        <div class="log-inline-item">
          <span class="log-type-badge ${badgeClass}">${badgeText}</span>
          <span style="font-weight:700;color:var(--accent)">${bk.team}</span>
          <span class="log-datetime">📅 ${dateStr2} ⏱ ${timeStr2}</span>
        </div>
      </div>`;
  } else if (logs.length > 0) {
    // 오래된 것부터 차례로 (인덱스 역순)
    const ordered = [...logs].reverse();
    let logHtml = `<div class="booking-log-inline"><div class="booking-log-inline-title">📋 예약 기록 (총 ${logs.length}건)</div>`;
    ordered.forEach((log, idx) => {
      const d = new Date(log.ts);
      const dStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const tStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
      const badgeText = log.action==='booked'?'예약':log.action==='changed'?'변경':'취소';
      const badgeClass = log.action==='booked'?'booked':log.action==='changed'?'changed':'cancelled';
      logHtml += `<div class="log-inline-item">
        <span style="font-size:10px;color:var(--text3);min-width:18px">${idx+1}</span>
        <span class="log-type-badge ${badgeClass}">${badgeText}</span>
        <span style="font-weight:700;color:var(--accent)">${log.team}</span>
        <span class="log-datetime">📅 ${dStr} ⏱ ${tStr}</span>
      </div>`;
    });
    logHtml += '</div>';
    form.innerHTML += logHtml;
  }

  // 슬롯 그리드 뒤에 폼 삽입
  const grid = slotEl.closest('.periods-grid');
  if (grid && grid.parentNode) {
    // 기존 폼 있으면 제거
    const existingForm = grid.parentNode.querySelector('.booking-form');
    if (existingForm) existingForm.remove();
    grid.after(form);
  } else {
    slotEl.after(form);
  }
}

function doBook(ds, room, period, teamVal) {
  const team = teamVal.trim().toUpperCase();
  if (!team) { showToast('팀명을 입력하세요.','error'); return; }
  const key = `${ds}|${room}|${period}`;
  const wasBooked = state.bookings[key] && state.bookings[key].action === 'booked';
  const action = wasBooked ? 'changed' : 'booked';
  state.bookings[key] = { team, action:'booked', ts:Date.now() };
  // 로그 기록
  if (!state.bookingLogs[key]) state.bookingLogs[key] = [];
  state.bookingLogs[key].unshift({ action, team, ts:Date.now(), date:ds, period });
  if (state.bookingLogs[key].length > 10) state.bookingLogs[key] = state.bookingLogs[key].slice(0,10);
  saveToSheets();
  showToast(`${room} ${period}교시 ${action==='changed'?'변경':'예약'} 완료 (${team})`,'success');
  closeModal();
  openBookingModal(ds, getEventDates()[ds]||[]);
}

function doCancel(ds, room, period) {
  const key = `${ds}|${room}|${period}`;
  if (state.bookings[key]) {
    const team = state.bookings[key].team;
    state.bookings[key] = {...state.bookings[key], action:'cancelled', ts:Date.now()};
    // 로그 기록
    if (!state.bookingLogs[key]) state.bookingLogs[key] = [];
    state.bookingLogs[key].unshift({ action:'cancelled', team, ts:Date.now(), date:ds, period });
    if (state.bookingLogs[key].length > 10) state.bookingLogs[key] = state.bookingLogs[key].slice(0,10);
  }
  saveToSheets();
  showToast(`${room} ${period}교시 예약 취소`,'');
  closeModal();
  openBookingModal(ds, getEventDates()[ds]||[]);
}

let searchRange = 'day';
function setSearchRange(r, btn) {
  searchRange = r;
  document.querySelectorAll('.search-range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function runSearch() {
  const dateVal = document.getElementById('search-date').value;
  const periodFilter = document.getElementById('search-period').value;
  if (!dateVal) { showToast('날짜를 선택하세요.','error'); return; }

  const startDate = new Date(dateVal+'T00:00:00');
  let days = [];

  if (searchRange==='day') days = [new Date(startDate)];
  else if (searchRange==='week') {
    const mon = new Date(startDate);
    const dow = mon.getDay();
    mon.setDate(mon.getDate() - (dow===0?6:dow-1));
    for (let i=0;i<5;i++) days.push(addDays(mon,i));
  } else {
    const first = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
    const last  = new Date(startDate.getFullYear(), startDate.getMonth()+1, 0);
    for (let d=new Date(first); d<=last; d=addDays(d,1)) {
      if (d.getDay()>=1&&d.getDay()<=5) days.push(new Date(d));
    }
  }

  const body = document.getElementById('search-body');
  body.innerHTML = '';
  let found = 0;

  days.forEach(day => {
    const ds = dateStr(day);
    const allClassrooms = [];
    Object.keys(state.teams).forEach(t => {
      (state.teams[t].classrooms||[]).filter(c=>c).forEach(rm => allClassrooms.push({team:t,room:rm}));
    });

    const available = [];
    allClassrooms.forEach(({team, room}) => {
      for (let p=0; p<=8; p++) {
        if (periodFilter!=='all' && parseInt(periodFilter)!==p) continue;
        const key = `${ds}|${room}|${p}`;
        const bk = state.bookings[key];
        if (!bk || bk.action==='cancelled') {
          available.push({room, p, team});
        }
      }
    });

    if (available.length) {
      found++;
      const card = document.createElement('div');
      card.className = 'search-result-card';
      card.innerHTML = `<div class="src-date">${ds} (${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][day.getDay()]})</div><div class="src-slots"></div>`;
      const slots = card.querySelector('.src-slots');
      available.forEach(({room,p}) => {
        const chip = document.createElement('div');
        chip.className = 'src-slot-chip';
        chip.textContent = `${room} ${p}교시`;
        chip.onclick = () => { closeModal(); openBookingModal(ds, getEventDates()[ds]||[]); };
        chip.style.cursor = 'pointer';
        slots.appendChild(chip);
      });
      body.appendChild(card);
    }
  });

  if (!found) body.innerHTML = '<div class="no-data">예약 가능한 시간이 없습니다.</div>';
}

function addDept() {

  // 기본 팀 5개 자동 생성

  state.deptTeams[name] = Array.from({length:5},(_,i)=>`${name}${i+1}`);
  buildTree();
  renderAdminPanel();
  showToast(name+' 과가 추가되었습니다.','success');
}

function addTeam() {
  const dept = document.getElementById('new-team-dept').value;
  const name = document.getElementById('new-team-name').value.trim().toUpperCase();
  if (!name) { showToast('팀명을 입력하세요.','error'); return; }

  renderAdminPanel();

}

function removeTeam(dept, team) {
  if (!confirm(`${team} 팀을 삭제하시겠습니까?`)) return;

  if (!state.deptTeams[dept]) state.deptTeams[dept] = getTeamsForDept(dept).slice();

  buildTree();
  renderAdminPanel();

}

function removeDept(dept) {
  if (!confirm(`${dept} 과를 삭제하시겠습니까?`)) return;

function adminAddRoom(team) {

  renderAdminPanel();
  saveToSheets();

function adminRemoveRoom(team, idx) {

  state.teams[team].classrooms = state.teams[team].classrooms.filter(c => c !== roomToRemove);
  renderAdminPanel();
  saveToSheets();
}

async function saveToSheets() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      body: JSON.stringify({ action:'save', teams:state.teams, bookings:state.bookings, depts:state.depts }),
      headers:{'Content-Type':'application/json'}
    });
  } catch(e) { console.warn('Sheets sync failed', e); }
}

async function loadFromSheets() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    const res = await fetch(APPS_SCRIPT_URL+'?action=load');
    const data = await res.json();
    if (data.teams) state.teams = data.teams;
    if (data.bookings) state.bookings = data.bookings;
    if (data.depts) state.depts = data.depts;
    buildTree();
    renderCalendar();
    showToast('데이터 로드 완료','success');
  } catch(e) { console.warn('Sheets load failed', e); }
}

function saveTeam(team) {
  FIXED_EVENTS.forEach(ev => {
    const inp = document.getElementById(`ev-${team}-${ev.key}-date`);
    if (inp) updateEvDate(team, ev.key, inp.value);
  });
  // 교실 입력칸 값 저장
  ensureTeam(team);
  const newClassrooms = [];
  for (let i = 0; i < 3; i++) {
    const inp = document.querySelector(`.classroom-inp-field[data-idx="${i}"]`);
    if (inp && inp.value.trim()) newClassrooms.push(inp.value.trim());
  }
  if (newClassrooms.length > 0) {
    state.teams[team].classrooms = newClassrooms;
  }
  saveToSheets();
  showToast(`${team} 전체 저장 완료`,'success');
  renderCalendar();
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.className='toast', 3000);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.getElementById('booking-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('booking-modal')) closeModal();
});

buildTree();
renderCalendar();
loadFromSheets();

document.getElementById('search-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
