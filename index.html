<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실 예약 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --sidebar-bg: #1a1f2e;
  --sidebar-text: #e8eaf0;
  --sidebar-accent: #4fc3f7;
  --sidebar-hover: #2a3245;
  --sidebar-active: #3d4f6e;

  --main-bg: #f0f4f8;
  --card-bg: #ffffff;
  --border: #dde3ec;
  --text-primary: #1a1f2e;
  --text-secondary: #546e8a;
  --text-muted: #8fa0b5;

  /* Pastel section colors */
  --cal-accent: #e3f2fd;
  --cal-header: #1976d2;
  --team-accent: #f2f3f5;
  --team-header: #3d4554;
  --search-accent: #e8f5e9;
  --search-header: #2e7d32;
  --admin-accent: #fff3e0;
  --admin-header: #e65100;

  /* Event colors - distinct */
  --ev-academic: #1565c0;
  --ev-immersion2: #6a1b9a;
  --ev-immersion3: #ad1457;
  --ev-cookery: #e65100;
  --ev-ooca1: #00695c;
  --ev-ooca2: #558b2f;
  --ev-ooca3: #f9a825;
  --ev-dlpt: #4527a0;
  --ev-custom: #0277bd;
  --ev-holiday: #b71c1c;

  --green: #2e7d32;
  --red: #c62828;
  --green-light: #e8f5e9;
  --red-light: #ffebee;

  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12);

  --font-size-base: 15.6px; /* 1.2x of 13px */
  --font-size-sm: 13.2px;
  --font-size-lg: 18px;
  --font-size-xl: 21.6px;
  --font-size-cal: 15.6px; /* 1.3x */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: var(--font-size-base);
  background: var(--main-bg);
  color: var(--text-primary);
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
  transition: width 0.3s;
}
#sidebar-logo {
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#sidebar-logo h1 {
  color: var(--sidebar-accent);
  font-size: 15px;
  font-weight: 900;
  letter-spacing: -0.3px;
  line-height: 1.3;
}
#sidebar-logo p { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 2px; }

/* GAS connection banner */
#gas-banner {
  margin: 10px 12px;
  background: linear-gradient(135deg, #1e3a5f, #2d4f7c);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  border: 1px solid rgba(79,195,247,0.3);
}
#gas-banner p { color: rgba(255,255,255,0.8); font-size: 11px; margin-bottom: 6px; line-height: 1.4; }
#gas-url-input {
  width: 100%;
  padding: 5px 8px;
  border-radius: 4px;
  border: 1px solid rgba(79,195,247,0.4);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 10.5px;
  margin-bottom: 6px;
}
#gas-url-input::placeholder { color: rgba(255,255,255,0.35); font-size: 10px; }
#gas-connect-btn {
  width: 100%;
  padding: 5px;
  background: var(--sidebar-accent);
  color: var(--sidebar-bg);
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}

nav#sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
nav#sidebar-nav::-webkit-scrollbar { width: 3px; }
nav#sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.nav-section { margin-bottom: 4px; }
.nav-section-label {
  color: rgba(255,255,255,0.3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 20px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  color: var(--sidebar-text);
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s;
  font-size: 14.4px;
  font-weight: 500;
  position: relative;
}
.nav-item:hover { background: var(--sidebar-hover); }
.nav-item.active {
  background: var(--sidebar-active);
  color: var(--sidebar-accent);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--sidebar-accent);
  border-radius: 0 2px 2px 0;
}
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-item .nav-arrow { margin-left: auto; font-size: 10px; opacity: 0.5; transition: transform 0.2s; }
.nav-item.expanded .nav-arrow { transform: rotate(90deg); }

.nav-sub { overflow: hidden; max-height: 0; transition: max-height 0.3s; }
.nav-sub.open { max-height: 300px; }
.nav-sub-item {
  padding: 7px 20px 7px 50px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; gap: 6px;
}
.nav-sub-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
.nav-sub-item.active { color: var(--sidebar-accent); }

.nav-sub-group { overflow: hidden; max-height: 0; transition: max-height 0.3s; }
.nav-sub-group.open { max-height: 400px; }
.nav-sub-group-item {
  padding: 5px 20px 5px 60px;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  font-size: 12.5px;
}
.nav-sub-group-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.75); }
.nav-sub-group-item.active { color: var(--sidebar-accent); }

#sidebar-bottom { padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.06); }
.nav-item.admin { color: rgba(255,255,255,0.35); font-size: 12.5px; }
.nav-item.admin:hover { color: rgba(255,255,255,0.6); }

/* MAIN CONTENT */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--main-bg);
}
#main-header {
  height: 50px;
  min-height: 50px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
#main-header h2 {
  font-size: var(--font-size-lg);
  font-weight: 700;
  color: var(--text-primary);
}
#connection-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ccc;
}
.status-dot.connected { background: var(--green); }
.status-dot.error { background: var(--red); }

#content-area {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════
   PANELS
══════════════════════════════════════════ */
.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

/* ══════════════════════════════════════════
   CALENDAR PANEL
══════════════════════════════════════════ */
#panel-calendar { background: var(--cal-accent); }
#cal-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
#cal-toolbar .cal-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--cal-header);
  min-width: 150px;
}
.btn {
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text-primary);
  font-size: var(--font-size-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn:hover { background: #f0f4f8; border-color: #aab; }
.btn.active, .btn.primary { background: var(--cal-header); color: #fff; border-color: var(--cal-header); }
.btn.today-btn { background: var(--card-bg); color: var(--cal-header); border-color: var(--cal-header); }
.btn.today-btn:hover { background: var(--cal-header); color: #fff; }

/* Legend */
#cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 16px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12.5px;
  color: var(--text-secondary);
}
.legend-dot {
  width: 11px; height: 11px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* Calendar grid */
#cal-container {
  flex: 1;
  overflow: hidden;
  padding: 10px;
}
#cal-grid {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
#cal-days-header {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--cal-header);
}
#cal-days-header div {
  text-align: center;
  padding: 9px;
  color: #fff;
  font-weight: 700;
  font-size: 14.3px; /* 1.3x base */
  letter-spacing: 0.3px;
}
#cal-body {
  flex: 1;
  overflow: hidden;
  display: grid;
}
/* Month view */
#cal-body.month-view {
  grid-template-rows: repeat(6, 1fr);
}
#cal-body.month-view .cal-week {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-top: 1px solid var(--border);
}
/* Week view */
#cal-body.week-view {
  grid-template-columns: repeat(5, 1fr);
  overflow-y: auto;
}

.cal-cell {
  border-right: 1px solid var(--border);
  padding: 5px;
  overflow: hidden;
  cursor: pointer;
  transition: background 0.12s;
  min-height: 0;
}
.cal-cell:last-child { border-right: none; }
.cal-cell:hover { background: #f5f8ff; }
.cal-cell.today { background: #fffde7; }
.cal-cell.other-month { background: #f8f9fc; }
.cal-cell.other-month .cal-date { opacity: 0.35; }

.cal-date {
  font-size: 14.3px; /* 1.3x */
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2px;
  line-height: 1;
}
.cal-cell.today .cal-date {
  background: var(--cal-header);
  color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.cal-event {
  font-size: 11px;
  padding: 1.5px 5px;
  border-radius: 3px;
  margin-bottom: 1.5px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 600;
  cursor: pointer;
}
.cal-event.light-text { color: #1a1f2e; }

/* Week view cells */
.week-cell {
  border-right: 1px solid var(--border);
  padding: 8px 6px;
  min-height: 200px;
}
.week-cell-date {
  font-size: 22px;
  font-weight: 800;
  color: var(--cal-header);
  margin-bottom: 6px;
}
.week-event {
  font-size: 12.5px;
  padding: 5px 8px;
  border-radius: 5px;
  margin-bottom: 4px;
  color: #fff;
  font-weight: 600;
}

/* ══════════════════════════════════════════
   TEAM PANEL
══════════════════════════════════════════ */
#panel-team { background: var(--team-accent); }
#team-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
#team-content::-webkit-scrollbar { width: 5px; }
#team-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

.team-header-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.team-name-badge {
  background: var(--team-header);
  color: #fff;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: 800;
}

.section-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.section-card h3 {
  font-size: 14.4px;
  font-weight: 700;
  color: var(--team-header);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Classroom inputs */
.classroom-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.classroom-row input {
  flex: 1;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: 'DM Mono', monospace;
}
.classroom-row input:focus { outline: none; border-color: var(--team-header); }
.icon-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: #f0f4f8; }
.icon-btn.danger:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }
.icon-btn.add { color: var(--green); border-color: var(--green); }
.icon-btn.add:hover { background: var(--green-light); }

/* Schedule grid - 2 columns */
.schedule-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.schedule-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.schedule-row:last-child { border-bottom: none; }
.schedule-label {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
}
.schedule-date-input {
  width: 90px;
  padding: 4px 7px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  font-family: 'DM Mono', monospace;
  text-align: center;
}
.schedule-date-input:focus { outline: none; border-color: var(--team-header); }
.ampm-btns { display: flex; gap: 3px; }
.ampm-btn {
  padding: 3px 7px;
  border-radius: 4px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.ampm-btn.active-am { background: #1976d2; color: #fff; border-color: #1976d2; }
.ampm-btn.active-pm { background: #e65100; color: #fff; border-color: #e65100; }

/* Custom events */
.custom-event-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.custom-event-row input[type="text"] {
  flex: 2;
  padding: 5px 9px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.custom-event-row input[type="date"] {
  flex: 1.5;
  padding: 5px 9px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.custom-event-row input:focus { outline: none; border-color: var(--team-header); }
.save-event-btn {
  padding: 5px 12px;
  background: var(--team-header);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
}
.saved-event-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--team-accent);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  font-size: 13px;
}
.saved-event-item .ev-name { font-weight: 700; flex: 1; }
.saved-event-item .ev-date { font-family: 'DM Mono', monospace; color: var(--text-secondary); }
.saved-event-item .ev-ampm { color: var(--text-secondary); font-weight: 700; font-size: 11px; }

.btn-save-all {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 18px;
  background: var(--team-header);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s;
  float: right;
}
.btn-save-all:hover { opacity: 0.85; }

/* ══════════════════════════════════════════
   SEARCH PANEL
══════════════════════════════════════════ */
#panel-search { background: var(--search-accent); }
#search-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
.search-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.search-toolbar select, .search-toolbar input[type="date"] {
  padding: 7px 11px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  background: var(--card-bg);
}
.search-toolbar select:focus, .search-toolbar input:focus { outline: none; border-color: var(--search-header); }
.btn.search-btn { background: var(--search-header); color: #fff; border-color: var(--search-header); font-size: 14px; }

.search-result-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}
.search-result-card h4 { font-size: 14.4px; font-weight: 700; color: var(--search-header); margin-bottom: 8px; }
.period-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.period-chip {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12.5px;
  font-weight: 700;
  background: var(--green-light);
  color: var(--green);
  border: 1.5px solid var(--green);
}
.period-chip.reserved { background: var(--red-light); color: var(--red); border-color: var(--red); }

/* ══════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════ */
#panel-admin { background: var(--admin-accent); }
#admin-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
#admin-auth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
}
#admin-auth-screen h3 { font-size: 18px; color: var(--admin-header); }
#admin-pw-input {
  padding: 9px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  width: 220px;
  text-align: center;
}
#admin-pw-input:focus { outline: none; border-color: var(--admin-header); }
.btn.admin-login-btn { background: var(--admin-header); color: #fff; border-color: var(--admin-header); padding: 8px 24px; }

.admin-section h3 { font-size: 15px; font-weight: 700; color: var(--admin-header); margin-bottom: 10px; }
.admin-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.admin-row input {
  flex: 1;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.admin-row input:focus { outline: none; border-color: var(--admin-header); }
.btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn.success { background: var(--green); color: #fff; border-color: var(--green); }

/* ══════════════════════════════════════════
   RESERVATION POPUP
══════════════════════════════════════════ */
#popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
#popup-overlay.open { display: flex; }
#res-popup {
  background: var(--card-bg);
  border-radius: 14px;
  padding: 20px;
  width: 90%;
  max-width: 640px;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: var(--shadow-md);
}
#res-popup::-webkit-scrollbar { width: 5px; }
#res-popup::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

#res-popup h3 {
  font-size: 17px;
  font-weight: 800;
  color: var(--cal-header);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#popup-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);

<script>
// ══════════════════════════════════════════════════════════════
//  ★ 관리자 설정 — GAS URL을 아래 한 줄에 붙여넣으세요 ★
//  Apps Script 배포 후 생성된 웹앱 URL을 여기에 입력하면
//  모든 사용자가 별도 설정 없이 자동으로 연결됩니다.
// ══════════════════════════════════════════════════════════════
const GAS_URL = '';   // ← 여기에 GAS URL 붙여넣기 (예: 'https://script.google.com/macros/s/ABC.../exec')

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
const STATE = {
  gasUrl: GAS_URL || localStorage.getItem('gasUrl') || '',
  connected: false,
  calView: 'month',
  calDate: new Date(),
  currentTeam: null,
  adminAuthed: false,
  teams: [],
  events: [],
  reservations: [],
  logs: [],
  // Default teams
  groups: ['KA','KB','KC','KD','KE','KF'],
};

// US Holidays (month is 0-indexed)
const US_HOLIDAYS = [
  { month:0, day:1, name:"New Year's Day" },
  { month:0, day:20, name:"MLK Day" },
  { month:1, day:17, name:"Presidents' Day" },
  { month:4, day:26, name:"Memorial Day" },
  { month:5, day:19, name:"Juneteenth" },
  { month:6, day:4, name:"Independence Day" },
  { month:8, day:1, name:"Labor Day" },
  { month:9, day:13, name:"Columbus Day" },
  { month:10, day:11, name:"Veterans Day" },
  { month:10, day:27, name:"Thanksgiving" },
  { month:11, day:25, name:"Christmas" },
];

const EVENT_COLORS = {
  'Academic Break': '#1565c0',
  'Immersion 2학기': '#6a1b9a',
  'Immersion 3학기': '#ad1457',
  'Cookery': '#e65100',
  'OOCA 1학기': '#00695c',
  'OOCA 2학기': '#558b2f',
  'OOCA 3학기': '#bf6f00',
  'DLPT': '#4527a0',
  'custom': '#0277bd',
  'holiday': '#b71c1c',
};

const LEGEND_ITEMS = [
  { label:'Academic Break', color:'#1565c0' },
  { label:'2학기 Immersion', color:'#6a1b9a' },
  { label:'3학기 Immersion', color:'#ad1457' },
  { label:'Cookery', color:'#e65100' },
  { label:'1학기 OOCA', color:'#00695c' },
  { label:'2학기 OOCA', color:'#558b2f' },
  { label:'3학기 OOCA', color:'#bf6f00' },
  { label:'DLPT', color:'#4527a0' },
  { label:'추가 행사', color:'#0277bd' },
];

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  initDefaultTeams();
  buildSidebarTeams();
  renderLegend();
  renderCalendar();
  loadLocalData();
  initSearchDate();

  // ── GAS 자동 연결 로직 ──────────────────────────────
  // 우선순위: ① 하드코딩된 GAS_URL → ② localStorage 저장값 → ③ 수동 입력
  if (STATE.gasUrl) {
    // URL이 이미 결정됨 → 배너 숨기고 자동 연결
    document.getElementById('gas-banner').style.display = 'none';
    connectGAS(true); // silent 모드
  } else {
    // URL 없음 → 배너 표시 (수동 입력 필요)
    document.getElementById('gas-banner').style.display = 'block';
  }
});

function initDefaultTeams() {
  if (STATE.teams.length) return;
  STATE.groups.forEach(g => {
    for (let i = 1; i <= 5; i++) {
      STATE.teams.push({
        teamId: `${g}${i}`,
        groupId: g,
        teamName: `${g}${i}`,
        classrooms: [],
      });
    }
  });
}

function loadLocalData() {
  const saved = localStorage.getItem('classroomData');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (d.teams) STATE.teams = d.teams;
      if (d.events) STATE.events = d.events;
      if (d.reservations) STATE.reservations = d.reservations;
      if (d.logs) STATE.logs = d.logs;
    } catch(e) {}
  }
}

function saveLocalData() {
  localStorage.setItem('classroomData', JSON.stringify({
    teams: STATE.teams,
    events: STATE.events,
    reservations: STATE.reservations,
    logs: STATE.logs,
  }));
}

// ══════════════════════════════════════════════════════════════
//  GAS CONNECTION
// ══════════════════════════════════════════════════════════════
async function connectGAS(silent=false) {
  // URL 결정: 하드코딩 > 수동입력 > 저장값
  const inputEl = document.getElementById('gas-url-input');
  const url = STATE.gasUrl || (inputEl ? inputEl.value.trim() : '');
  if (!url) { showToast('GAS URL을 입력하세요', 'error'); return; }

  STATE.gasUrl = url;
  // 수동 입력한 경우 localStorage에 저장 (다음 방문 시 재사용)
  if (!GAS_URL) localStorage.setItem('gasUrl', url);

  if (!silent) showLoading(true);
  try {
    const data = await gasRequest({ action: 'getData' });
    if (data.teams) {
      STATE.teams = data.teams.map(t => ({
        ...t,
        classrooms: typeof t.classrooms === 'string' ? JSON.parse(t.classrooms || '[]') : (t.classrooms || [])
      }));
      if (data.events) STATE.events = data.events;
      if (data.reservations) STATE.reservations = data.reservations.filter(r => r.status === 'reserved');
      if (data.logs) STATE.logs = data.logs;
    }
    STATE.connected = true;
    document.getElementById('gas-banner').style.display = 'none';
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent = '연결됨';
    buildSidebarTeams();
    renderCalendar();
    saveLocalData();
    if (!silent) showToast('Google Sheets 연결 완료!', 'success');
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-text').textContent = '연결 오류';
    if (!silent) showToast('연결 실패: ' + e.message, 'error');
    // 연결 실패 시 배너 다시 표시
    if (silent && !GAS_URL) {
      document.getElementById('gas-banner').style.display = 'block';
    }
  }
  showLoading(false);
}

async function gasRequest(requestData) {
  if (!STATE.gasUrl) throw new Error('GAS URL이 설정되지 않았습니다');
  // GAS 웹앱은 POST 요청 시 302 리다이렉트가 발생해 body가 소실됩니다.
  // 이를 우회하기 위해 action과 payload를 쿼리스트링으로 GET 전송합니다.
  const action = requestData.action;
  const payload = requestData.payload ? JSON.stringify(requestData.payload) : '';
  const url = STATE.gasUrl
    + '?action=' + encodeURIComponent(action)
    + (payload ? '&payload=' + encodeURIComponent(payload) : '');

  const res = await fetch(url, {
    method: 'GET',
    redirect: 'follow',
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function gasSave(payload, localUpdate) {
  localUpdate();
  saveLocalData();
  renderCalendar();
  if (!STATE.connected) return;
  try {
    await gasRequest(payload);
  } catch(e) {
    showToast('서버 저장 실패 (로컬에는 저장됨)', 'error');
  }
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  const titles = { calendar:'캘린더', team:'과·팀', search:'검색', admin:'관리' };
  document.getElementById('main-title').textContent = titles[name] || name;
  closeMobileMenu();
}

function toggleNavGroup(id) {
  const el = document.getElementById(id);
  const btn = document.getElementById('nav-team-toggle');
  el.classList.toggle('open');
  btn.classList.toggle('expanded');
}

function buildSidebarTeams() {
  const container = document.getElementById('team-group');
  container.innerHTML = '';
  STATE.groups.forEach(g => {
    const groupDiv = document.createElement('div');
    groupDiv.innerHTML = `
      <div class="nav-sub-item" onclick="toggleSubGroup('sub-${g}')">
        <span>🏷</span> ${g} <span class="nav-arrow" style="margin-left:auto;font-size:10px;">▶</span>
      </div>
      <div class="nav-sub-group" id="sub-${g}">
        ${[1,2,3,4,5].map(i => `
          <div class="nav-sub-group-item" id="nav-team-${g}${i}" onclick="openTeam('${g}${i}')">
            ${g}${i}
          </div>`).join('')}
      </div>`;
    container.appendChild(groupDiv);
  });
}

function toggleSubGroup(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function openTeam(teamId) {
  STATE.currentTeam = teamId;
  document.querySelectorAll('.nav-sub-group-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-team-' + teamId);
  if (el) el.classList.add('active');
  showPanel('team');
  renderTeamPage(teamId);
  closeMobileMenu();
}

function openMobileMenu() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobile-overlay').classList.add('show');
}
function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobile-overlay').classList.remove('show');
}

// ══════════════════════════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════════════════════════
function setCalView(v) {
  STATE.calView = v;
  document.getElementById('btn-month').classList.toggle('active', v==='month');
  document.getElementById('btn-week').classList.toggle('active', v==='week');
  renderCalendar();
}

function calNavigate(dir) {
  const d = STATE.calDate;
  if (STATE.calView === 'month') {
    STATE.calDate = new Date(d.getFullYear(), d.getMonth() + dir, 1);
  } else {
    STATE.calDate = new Date(d.getFullYear(), d.getMonth(), d.getDate() + dir * 7);
  }
  renderCalendar();
}

function calGoToday() {
  STATE.calDate = new Date();
  renderCalendar();
}

function renderCalendar() {
  if (STATE.calView === 'month') renderMonthView();
  else renderWeekView();
}

function getMonthTitle(d) {
  return d.toLocaleDateString('en-US', { month:'long', year:'numeric' });
}
function getWeekTitle(d) {
  const start = getMonday(d);
  const end = new Date(start); end.setDate(end.getDate() + 4);
  return `${start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
}

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function isHoliday(date) {
  return US_HOLIDAYS.find(h => h.month === date.getMonth() && h.day === date.getDate());
}

function getEventsForDate(dateStr) {
  const results = [];
  STATE.events.forEach(ev => {
    if (!ev.startDate) return;
    const start = ev.startDate;
    const end = ev.endDate || ev.startDate;
    if (dateStr >= start && dateStr <= end) {
      results.push(ev);
    }
  });
  return results;
}

function renderMonthView() {
  const d = STATE.calDate;
  document.getElementById('cal-title-text').textContent = getMonthTitle(d);
  const body = document.getElementById('cal-body');
  body.className = 'month-view';
  body.innerHTML = '';

  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
  const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  const today = new Date();
  const todayStr = toDateStr(today);

  // Start from Monday of the first week
  const startDate = new Date(firstDay);
  const dow = firstDay.getDay();
  const startOffset = dow === 0 ? -6 : 1 - dow;
  startDate.setDate(startDate.getDate() + startOffset);

  for (let week = 0; week < 6; week++) {
    const weekDiv = document.createElement('div');
    weekDiv.className = 'cal-week';
    for (let dayOfWeek = 0; dayOfWeek < 5; dayOfWeek++) {
      const cur = new Date(startDate);
      cur.setDate(startDate.getDate() + week * 7 + dayOfWeek);
      const isOtherMonth = cur.getMonth() !== d.getMonth();
      const curStr = toDateStr(cur);
      const holiday = isHoliday(cur);

      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (curStr === todayStr ? ' today' : '') + (isOtherMonth ? ' other-month' : '');
      cell.onclick = () => openReservationPopup(curStr);

      let html = `<div class="cal-date">${cur.getDate()}</div>`;
      if (holiday) {
        html += `<div class="cal-event" style="background:${EVENT_COLORS.holiday};">${holiday.name}</div>`;
      }
      getEventsForDate(curStr).forEach(ev => {
        const color = EVENT_COLORS[ev.eventType] || EVENT_COLORS.custom;
        const light = isLightColor(color);
        html += `<div class="cal-event${light?' light-text':''}" style="background:${color};">${ev.eventType || ''}</div>`;
      });
      cell.innerHTML = html;
      weekDiv.appendChild(cell);
    }
    body.appendChild(weekDiv);
    // Stop after all days of the month are shown
    const lastInWeek = new Date(startDate);
    lastInWeek.setDate(startDate.getDate() + week * 7 + 4);
    if (lastInWeek >= lastDay && week >= 3) break;
  }
}

function renderWeekView() {
  const d = STATE.calDate;
  const monday = getMonday(d);
  document.getElementById('cal-title-text').textContent = getWeekTitle(d);
  const body = document.getElementById('cal-body');
  body.className = 'week-view';
  body.innerHTML = '';
  const today = new Date();
  const todayStr = toDateStr(today);

  for (let i = 0; i < 5; i++) {
    const cur = new Date(monday);
    cur.setDate(monday.getDate() + i);
    const curStr = toDateStr(cur);
    const holiday = isHoliday(cur);

    const cell = document.createElement('div');
    cell.className = 'week-cell' + (curStr === todayStr ? ' today' : '');
    cell.onclick = () => openReservationPopup(curStr);

    let html = `<div class="week-cell-date">${cur.getDate()}</div>`;
    if (holiday) {
      html += `<div class="week-event" style="background:${EVENT_COLORS.holiday};">${holiday.name}</div>`;
    }
    getEventsForDate(curStr).forEach(ev => {
      const color = EVENT_COLORS[ev.eventType] || EVENT_COLORS.custom;
      html += `<div class="week-event" style="background:${color};color:#fff;">${ev.eventType || ''}</div>`;
    });
    cell.innerHTML = html;
    body.appendChild(cell);
  }
}

function renderLegend() {
  const el = document.getElementById('cal-legend');
  el.innerHTML = LEGEND_ITEMS.map(item => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${item.color};"></div>
      <span>${item.label}</span>
    </div>`).join('');
}

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 150;
}

let teamNewAmPm = {};
function toggleAmPm(prefix, val, id) {
  const key = prefix + (id || '');
  teamNewAmPm[key] = teamNewAmPm[key] === val ? null : val;
  const cur = teamNewAmPm[key];
  if (prefix === 'new') {
    document.getElementById('new-ev-am').className = 'ampm-btn' + (cur==='AM'?' active-am':'');
    document.getElementById('new-ev-pm').className = 'ampm-btn' + (cur==='PM'?' active-pm':'');
  } else {
    const am = document.getElementById(`sch-am-${id}`);
    const pm = document.getElementById(`sch-pm-${id}`);
    if (am) am.className = 'ampm-btn' + (cur==='AM'?' active-am':'');
    if (pm) pm.className = 'ampm-btn' + (cur==='PM'?' active-pm':'');
  }
}

function autoFormatDate(el) {
  let v = el.value.replace(/\D/g,'');
  if (v.length === 6 && el.selectionStart === 6) {
    // 052026 -> 05/20/26
    v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
    el.value = v;
  } else if (v.length > 2 && v.length <= 4) {
    el.value = v.slice(0,2) + '/' + v.slice(2);
  } else if (v.length > 4) {
    el.value = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4,6);
  }
}

const SCHEDULE_MAP = {
  academic_break: 'Academic Break',
  immersion2: 'Immersion 2학기',
  immersion3: 'Immersion 3학기',
  cookery: 'Cookery',
  ooca1: 'OOCA 1학기',
  ooca2: 'OOCA 2학기',
  ooca3: 'OOCA 3학기',
  dlpt: 'DLPT',
};

const DURATION_MAP = {
  academic_break: 5, // Mon-Fri including input date
  immersion2: 2,
  immersion3: 2,
  cookery: 1,
  ooca1: 1,
  ooca2: 1,
  ooca3: 1,
  dlpt: 7, // Thu ~ next Wed
};

function mmddyyToISO(str) {
  const p = str.split('/');
  if (p.length === 3) {
    const y = parseInt(p[2]) < 50 ? '20' + p[2] : '19' + p[2];
    return `${y}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
  }
  return str;
}

function getEndDate(startISO, schKey) {
  const d = new Date(startISO + 'T00:00:00');
  if (schKey === 'academic_break') {
    // Include input date, go to Friday of that week
    const day = d.getDay(); // 0=Sun, 1=Mon, ..., 5=Fri
    const daysToFri = day === 0 ? 5 : (5 - day);
    const end = new Date(d);
    end.setDate(d.getDate() + daysToFri);
    return toDateStr(end);
  }
  if (schKey === 'dlpt') {
    // Thu of that week to next Wed
    const day = d.getDay();
    const daysToThu = day <= 4 ? (4 - day) : (4 - day + 7);
    const thu = new Date(d);
    thu.setDate(d.getDate() + daysToThu);
    const wed = new Date(thu);
    wed.setDate(thu.getDate() + 6);
    return toDateStr(wed); // end is next Wed
  }
  const dur = DURATION_MAP[schKey] || 1;
  const end = new Date(d);
  end.setDate(d.getDate() + dur - 1);
  return toDateStr(end);
}

function getDlptStart(startISO) {
  const d = new Date(startISO + 'T00:00:00');
  const day = d.getDay();
  const daysToThu = day <= 4 ? (4 - day) : (4 - day + 7);
  const thu = new Date(d);
  thu.setDate(d.getDate() + daysToThu);
  return toDateStr(thu);
}

async function saveTeamAll(teamId) {
  // Collect classrooms
  const crInputs = document.querySelectorAll('.cr-input');
  const classrooms = Array.from(crInputs).map(i => i.value.trim()).filter(Boolean);

  // Collect schedule events
  const scheduleEvents = [];
  Object.entries(SCHEDULE_MAP).forEach(([key, evType]) => {
    const dateEl = document.getElementById('sch-date-' + key);
    if (!dateEl || !dateEl.value) return;
    const startDate = mmddyyToISO(dateEl.value);
    const amKey = 'sch' + key;
    const ampm = teamNewAmPm[amKey] || '';
    let start = startDate;
    let end = getEndDate(startDate, key);
    if (key === 'dlpt') start = getDlptStart(startDate);

    // Remove old
    STATE.events = STATE.events.filter(e => !(e.teamId === teamId && e.eventType === evType && !e.isCustom));
    const evId = `${teamId}_${key}`;
    const ev = { eventId: evId, teamId, eventType: evType, startDate: start, endDate: end, ampm, isCustom: false };
    STATE.events.push(ev);
    scheduleEvents.push(ev);
  });

  // Update team
  const idx = STATE.teams.findIndex(t => t.teamId === teamId);
  if (idx >= 0) {
    STATE.teams[idx].classrooms = classrooms;
  } else {
    STATE.teams.push({ teamId, groupId: teamId.slice(0,-1), teamName: teamId, classrooms });
  }

  saveLocalData();
  renderCalendar();
  showToast('저장 완료!', 'success');

  if (STATE.connected) {
    showLoading(true);
    try {
      await gasRequest({ action: 'saveTeam', payload: { teamId, groupId: teamId.slice(0,-1), teamName: teamId, classrooms } });
      for (const ev of scheduleEvents) {
        await gasRequest({ action: 'saveEvent', payload: ev });
      }
    } catch(e) { showToast('서버 저장 실패', 'error'); }
    showLoading(false);
  }
}

let popupState = { date: '', classroom: '', period: null };

function openReservationPopup(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return; // Skip weekends

  popupState.date = dateStr;
  popupState.period = null;
  popupState.classroom = '';

  document.getElementById('popup-title').textContent = `교실 예약 — ${dateStr}`;
  document.getElementById('popup-overlay').classList.add('open');
  renderPopupBody(dateStr);
}

function renderPopupBody(dateStr) {
  const body = document.getElementById('popup-body');
  // Find which events are on this date and which teams/classrooms
  const eventsOnDate = [];
  STATE.events.forEach(ev => {
    if (ev.startDate && dateStr >= ev.startDate && dateStr <= (ev.endDate || ev.startDate)) {
      eventsOnDate.push(ev);
    }
  });

  // Get all teams that have events on this date
  const teamsOnDate = [...new Set(eventsOnDate.map(e => e.teamId))];
  // Also get all teams that have classrooms
  const allTeamsWithClassrooms = STATE.teams.filter(t => t.classrooms && t.classrooms.length > 0);

  let classroomBlocks = '';

  if (allTeamsWithClassrooms.length === 0) {
    classroomBlocks = `<div style="color:var(--text-muted);padding:16px;text-align:center;">교실 정보가 없습니다. 먼저 팀 메뉴에서 교실을 추가하세요.</div>`;
  } else {
    allTeamsWithClassrooms.forEach(team => {
      (team.classrooms || []).forEach(classroom => {
        if (!classroom) return;
        classroomBlocks += buildClassroomBlock(team, classroom, dateStr);
      });
    });
  }

  const logs = STATE.logs.filter(l => l.date === dateStr).sort((a,b) => (a.logId > b.logId ? -1 : 1));

  body.innerHTML = `
    ${classroomBlocks}
    <div class="reservation-form">
      <input type="text" id="res-team-input" placeholder="예) KA1" maxlength="4" oninput="this.value=this.value.toUpperCase()">
      <button class="res-action-btn reserve" onclick="doReservation('reserve')">예약</button>
      <button class="res-action-btn change" onclick="doReservation('change')">변경</button>
      <button class="res-action-btn cancel" onclick="doReservation('cancel')">취소</button>
    </div>
    <div id="selected-info" style="font-size:12.5px;color:var(--text-secondary);padding:4px 8px;margin-bottom:4px;"></div>
    <div class="log-list">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">📋 예약 내역</div>
      ${logs.length ? logs.map(l => `
        <div class="log-item">
          <span class="log-action ${l.action}">${l.action === 'reserve' ? '예약' : l.action === 'cancel' ? '취소' : '변경'}</span>
          <span style="font-family:'DM Mono',monospace;">${l.date}</span>
          <span>${l.classroom}</span>
          <span>${l.period}교시</span>
          <span style="font-weight:700;">${l.teamId}</span>
        </div>`).join('') : '<div style="color:var(--text-muted);font-size:12px;">내역 없음</div>'}
    </div>`;
}

function buildClassroomBlock(team, classroom, dateStr) {
  const periods = [0,1,2,3,4,5,6,7,8];
  let periodBtns = '';
  const ampmInfo = getAmPmForTeamDate(team.teamId, dateStr);

  periods.forEach(p => {
    const res = STATE.reservations.find(r =>
      r.date === dateStr && r.classroom === classroom &&
      String(r.period) === String(p) && r.status === 'reserved'
    );
    let cls = 'period-btn';
    let blocked = false;
    if (ampmInfo) {
      if (ampmInfo === 'AM' && p >= 5) { cls += ' blocked'; blocked = true; }
      if (ampmInfo === 'PM' && p <= 4) { cls += ' blocked'; blocked = true; }
    }
    if (!blocked && res) cls += ' reserved';
    const label = p + '교시';
    const tooltip = res ? res.teamId : '';
    periodBtns += `<button class="${cls}" title="${tooltip}"
      onclick="selectPeriod('${classroom}',${p},this)"
      ${blocked ? 'disabled' : ''}>${label}</button>`;
  });

  return `
    <div class="popup-classroom-block">
      <div class="popup-classroom-header">${classroom} <small style="opacity:.7;">(${team.teamName})</small></div>
      <div class="popup-periods">${periodBtns}</div>
    </div>`;
}

function getAmPmForTeamDate(teamId, dateStr) {
  const ev = STATE.events.find(e =>
    e.teamId === teamId &&
    e.startDate && dateStr >= e.startDate &&
    dateStr <= (e.endDate || e.startDate) &&
    e.ampm
  );
  return ev ? ev.ampm : null;
}

function selectPeriod(classroom, period, btn) {
  if (btn.disabled) return;
  // Deselect previous
  document.querySelectorAll('.period-btn.selected').forEach(b => {
    b.classList.remove('selected');
  });
  popupState.classroom = classroom;
  popupState.period = period;
  btn.classList.add('selected');

  // Show current reservation info
  const res = STATE.reservations.find(r =>
    r.date === popupState.date && r.classroom === classroom &&
    String(r.period) === String(period) && r.status === 'reserved'
  );
  const el = document.getElementById('selected-info');
  if (el) el.textContent = res ? `현재 예약: ${res.teamId}` : `${period}교시 선택됨`;
}

async function doReservation(action) {
  const teamId = document.getElementById('res-team-input').value.trim().toUpperCase();
  const { date, classroom, period } = popupState;

  if (!teamId) { showToast('팀 이름을 입력하세요', 'error'); return; }
  if (!classroom || period === null) { showToast('교시를 선택하세요', 'error'); return; }

  const payload = { date, classroom, period, teamId };

  if (action === 'cancel') {
    // Cancel
    STATE.reservations = STATE.reservations.filter(r =>
      !(r.date === date && r.classroom === classroom && String(r.period) === String(period))
    );
    STATE.logs.unshift({ logId:'log_'+Date.now(), action:'cancel', date, classroom, period, teamId });
    saveLocalData();
    renderPopupBody(date);
    showToast('예약이 취소되었습니다', 'success');
    if (STATE.connected) gasRequest({ action:'cancelReservation', payload }).catch(()=>{});
    return;
  }

  // Check duplicate
  const dup = STATE.reservations.find(r =>
    r.date === date && r.classroom === classroom &&
    String(r.period) === String(period) && r.status === 'reserved' && r.teamId !== teamId
  );
  if (dup && action === 'reserve') {
    showToast(`이미 ${dup.teamId}팀이 예약했습니다`, 'error'); return;
  }

  // Remove old if change
  STATE.reservations = STATE.reservations.filter(r =>
    !(r.date === date && r.classroom === classroom && String(r.period) === String(period))
  );
  STATE.reservations.push({ date, classroom, period: String(period), teamId, status:'reserved' });
  const logAction = action === 'change' ? 'update' : 'reserve';
  STATE.logs.unshift({ logId:'log_'+Date.now(), action:logAction, date, classroom, period, teamId });
  saveLocalData();
  renderPopupBody(date);
  showToast(action === 'change' ? '예약이 변경되었습니다' : '예약이 완료되었습니다', 'success');
  if (STATE.connected) gasRequest({ action:'saveReservation', payload }).catch(()=>{});
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
}
function closePopupIfOutside(e) {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
}

// ══════════════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════════════
function initSearchDate() {
  const today = new Date();
  document.getElementById('search-date-input').value = toDateStr(today);
}

function updateSearchInputs() { /* placeholder for future expansion */ }

function doSearch() {
  const type = document.getElementById('search-type').value;
  const dateVal = document.getElementById('search-date-input').value;
  const avail = document.getElementById('search-availability').value;
  if (!dateVal) { showToast('날짜를 선택하세요', 'error'); return; }

  let dates = [];
  const d = new Date(dateVal + 'T00:00:00');

  if (type === 'date') {
    dates = [toDateStr(d)];
  } else if (type === 'week') {
    const mon = getMonday(d);
    for (let i = 0; i < 5; i++) {
      const day = new Date(mon); day.setDate(mon.getDate() + i);
      dates.push(toDateStr(day));
    }
  } else {
    const y = d.getFullYear(), m = d.getMonth();
    const last = new Date(y, m+1, 0).getDate();
    for (let i = 1; i <= last; i++) {
      const day = new Date(y, m, i);
      if (day.getDay() !== 0 && day.getDay() !== 6) dates.push(toDateStr(day));
    }
  }

  const results = document.getElementById('search-results');
  results.innerHTML = '';

  const allClassrooms = [];
  STATE.teams.forEach(t => (t.classrooms||[]).forEach(c => {
    if (c && !allClassrooms.includes(c)) allClassrooms.push(c);
  }));

  if (allClassrooms.length === 0) {
    results.innerHTML = '<div style="color:var(--text-muted);padding:16px;">교실 정보가 없습니다.</div>';
    return;
  }

  dates.forEach(dateStr => {
    const card = document.createElement('div');
    card.className = 'search-result-card';
    let html = `<h4>${dateStr}</h4>`;
    allClassrooms.forEach(classroom => {
      html += `<div style="margin-bottom:6px;"><strong style="font-size:13px;">${classroom}</strong><div class="period-grid">`;
      for (let p = 0; p <= 8; p++) {
        const res = STATE.reservations.find(r =>
          r.date === dateStr && r.classroom === classroom &&
          String(r.period) === String(p) && r.status === 'reserved'
        );
        const isReserved = !!res;
        if (avail === 'available' && isReserved) continue;
        html += `<div class="period-chip ${isReserved?'reserved':''}">
          ${p}교시 ${isReserved ? res.teamId : '✓'}
        </div>`;
      }
      html += '</div></div>';
    });
    card.innerHTML = html;
    results.appendChild(card);
  });
  if (!results.children.length) {
    results.innerHTML = '<div style="color:var(--text-muted);padding:16px;">결과가 없습니다.</div>';
  }
}

// ══════════════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════════════
async function adminLogin() {
  const pw = document.getElementById('admin-pw-input').value;
  let authed = false;
  if (STATE.connected) {
    try {
      const res = await gasRequest({ action: 'adminAuth', payload: { password: pw } });
      authed = res.auth;
    } catch(e) { authed = pw === 'admin1234'; }
  } else {
    authed = pw === 'admin1234';
  }
  if (authed) {
    STATE.adminAuthed = true;
    document.getElementById('admin-auth-screen').style.display = 'none';
    document.getElementById('admin-main').style.display = 'block';
    renderAdminPanel();
  } else {
    showToast('비밀번호가 올바르지 않습니다', 'error');
  }
}

function renderAdminPanel() {
  const el = document.getElementById('admin-main');
  el.innerHTML = `
    <div class="section-card admin-section">
      <h3>과(Group) 관리</h3>
      <div id="admin-groups">
        ${STATE.groups.map(g => `
          <div class="admin-row">
            <input type="text" value="${g}" id="grp-${g}">
            <button class="btn danger" onclick="deleteGroup('${g}')">삭제</button>
          </div>`).join('')}
      </div>
      <div class="admin-row" style="margin-top:8px;">
        <input type="text" id="new-group-input" placeholder="새 과 이름">
        <button class="btn success" onclick="addGroup()">추가</button>
      </div>
    </div>
    <div class="section-card admin-section">
      <h3>팀 관리</h3>
      <div id="admin-teams">
        ${STATE.teams.map(t => `
          <div class="admin-row">
            <span style="font-weight:700;min-width:60px;">${t.teamId}</span>
            <input type="text" value="${t.teamName}" id="tm-${t.teamId}" placeholder="팀명">
            <button class="btn danger" onclick="deleteTeamAdmin('${t.teamId}')">삭제</button>
          </div>`).join('')}
      </div>
    </div>
    <div class="section-card admin-section">
      <h3>교실 관리</h3>
      ${STATE.teams.filter(t => t.classrooms && t.classrooms.length).map(t => `
        <div style="margin-bottom:8px;">
          <strong>${t.teamName}</strong>: ${t.classrooms.join(', ')}
        </div>`).join('')}
    </div>`;
}

function addGroup() {
  const name = document.getElementById('new-group-input').value.trim().toUpperCase();
  if (!name) return;
  if (STATE.groups.includes(name)) { showToast('이미 존재하는 과입니다', 'error'); return; }
  STATE.groups.push(name);
  for (let i = 1; i <= 5; i++) {
    STATE.teams.push({ teamId:`${name}${i}`, groupId:name, teamName:`${name}${i}`, classrooms:[] });
  }
  saveLocalData();
  buildSidebarTeams();
  renderAdminPanel();
  showToast(`${name} 과가 추가되었습니다`, 'success');
}

function deleteGroup(name) {
  if (!confirm(`${name} 과를 삭제하시겠습니까?`)) return;
  STATE.groups = STATE.groups.filter(g => g !== name);
  STATE.teams = STATE.teams.filter(t => t.groupId !== name);
  saveLocalData();
  buildSidebarTeams();
  renderAdminPanel();
  showToast(`${name} 과가 삭제되었습니다`, 'success');
}

function deleteTeamAdmin(teamId) {
  if (!confirm(`${teamId} 팀을 삭제하시겠습니까?`)) return;
  STATE.teams = STATE.teams.filter(t => t.teamId !== teamId);
  saveLocalData();
  buildSidebarTeams();
  renderAdminPanel();
  showToast(`${teamId} 팀이 삭제되었습니다`, 'success');
  if (STATE.connected) gasRequest({ action:'deleteTeam', payload:{ teamId } }).catch(()=>{});
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  setTimeout(() => el.className = '', 2800);
}

function showLoading(show) {
  document.getElementById('loading-overlay').className = show ? 'show' : '';
}
